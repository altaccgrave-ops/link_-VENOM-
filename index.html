<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>VENOM</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    color: white;
    background: radial-gradient(circle, #111 0%, #000 100%);
    overflow-x: hidden;
}

/* BACKGROUND */
body::before {
    content: "";
    position: fixed;
    width: 200%;
    height: 200%;
    background: url("https://www.transparenttextures.com/patterns/stardust.png");
    opacity: 0.3;
    animation: moveStars 60s linear infinite;
}
@keyframes moveStars {
    from { transform: translate(0,0); }
    to { transform: translate(-500px,-500px); }
}

/* NAVBAR */
.navbar {
    text-align: center;
    padding: 20px;
}

.nav-links a {
    margin: 0 15px;
    text-decoration: none;
    color: white;
    cursor: pointer;
}

.nav-links a:hover {
    color: gray;
}

/* PAGES */
.page {
    display: none;
}
.active {
    display: block;
}

/* BACK BUTTON */
.back {
    position: fixed;
    top: 20px;
    left: 20px;
    padding: 8px 15px;
    border: 1px solid white;
    background: transparent;
    cursor: pointer;
}

/* HERO */
.hero {
    text-align: center;
    margin-top: 80px;
}

.logo-box {
    display: inline-flex;
    align-items: center;
    gap: 20px;
}

.shield {
    width: 60px;
    height: 60px;
    border: 3px solid white;
}
.shield.big {
    width: 90px;
    height: 90px;
}

.hero h2 {
    font-size: 50px;
}

.gradient-text {
    font-size: 90px;
    background: linear-gradient(90deg, white, gray);
    -webkit-background-clip: text;
    color: transparent;
}

.hero h3 {
    font-size: 75px;
}

/* SECTION */
.section-title {
    text-align: center;
    margin: 120px 0 40px;
    font-size: 40px;
}

/* CARDS */
.container {
    display: flex;
    justify-content: center;
    gap: 30px;
}

.card {
    width: 300px;
    border: 1px solid white;
    border-radius: 20px;
    padding: 20px;
}

.icon {
    width: 30px;
    height: 30px;
    border: 2px solid white;
    border-radius: 50%;
}

.image {
    height: 120px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:40px;
}

.btn {
    margin-top: 15px;
    padding: 10px;
    border: 1px solid white;
    text-align: center;
    cursor: pointer;
}

/* STATUS */
.status-box {
    width: 400px;
    margin: 100px auto;
    border: 1px solid white;
    padding: 30px;
    text-align: center;
}

.bar {
    height: 20px;
    background: green;
    margin-top: 20px;
}
</style>
</head>

<body>

<div class="navbar">
    <h1>VENOM</h1>
    <div class="nav-links">
        <a onclick="showPage('home')">Home</a>
        <a onclick="showPage('status')">Status</a>
        <a onclick="goDiscord()">Discord 🟣</a>
    </div>
</div>

<!-- HOME -->
<div id="home" class="page active">

<div class="hero">
    <div class="logo-box">
        <div class="shield"></div>
        <h2>VENOM!!</h2>
        <div class="shield big"></div>
    </div>

    <p class="gradient-text">Dominate The Field</p>
    <h3>With Venom!</h3>
</div>

<h2 class="section-title">-Our Products-</h2>

<div class="container">

<div class="card">
<h3><div class="icon"></div> Executor Venom</h3>
<div class="image">🔫</div>
<div class="btn" onclick="showPage('executor')">💉 EXPLORE EXECUTOR</div>
</div>

<div class="card">
<h3><div class="icon"></div> Da Hood</h3>
<div class="image">🟥</div>
<div class="btn" onclick="showPage('daHood')">💉 EXPLORE SCRIPT</div>
</div>

<div class="card">
<h3><div class="icon"></div> Blade Ball</h3>
<div class="image">⚔️</div>
<div class="btn" onclick="showPage('blade')">💉 EXPLORE SCRIPT</div>
</div>

</div>
</div>

<!-- STATUS -->
<div id="status" class="page">
<button class="back" onclick="showPage('home')">← BACK</button>

<div class="status-box">
<h1>VENOM EXECUTOR</h1>
<h2>100% SAFE + VERIFIED</h2>
<div class="bar"></div>
</div>
</div>

<!-- EXECUTOR PAGE -->
<div id="executor" class="page">
<button class="back" onclick="showPage('home')">← BACK</button>

<div class="status-box">
<h1>Key-Less</h1>
<div class="btn">DOWNLOAD</div>
</div>
</div>

<!-- SCRIPT PAGES -->
<div id="daHood" class="page">
<button class="back" onclick="showPage('home')">← BACK</button>
<div class="status-box">
<h2>Scripts list</h2>
<div class="btn">COPY</div>
<div class="btn">COPY</div>
</div>
</div>

<div id="blade" class="page">
<button class="back" onclick="showPage('home')">← BACK</button>
<div class="status-box">
<h2>Scripts list</h2>
<div class="btn">COPY</div>
<div class="btn">COPY</div>
</div>
</div>

<script>
function showPage(page) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById(page).classList.add('active');
}

function goDiscord() {
    window.open("https://discord.gg/BGUjzYhh84", "_blank");
}
</script>

</body>
</html>
