<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>VENOM</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            padding: 0;
            text-align: center;
            color: white;
            font-family: Arial, sans-serif;

            /* Fond Venom */
            background: url('https://wallpapercave.com/wp/wp5128415.jpg') no-repeat center center fixed;
            background-size: cover;
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 80px;
            margin-top: 40px;
            color: white;
            text-shadow: 0 0 20px black;
        }

        a {
            color: #00ffff;
            font-size: 20px;
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }

        .description {
            margin-top: 40px;
            font-weight: bold;
            font-size: 22px;
            color: white;
            text-shadow: 0 0 10px black;
        }

        .btn {
            margin-top: 60px;
            padding: 15px 40px;
            font-size: 20px;
            border: none;
            background: black;
            color: white;
            cursor: pointer;
            border-radius: 10px;
            transition: 0.3s;
        }

        .btn:hover {
            background: white;
            color: black;
        }
    </style>
</head>
<body>

    <!-- Titre -->
    <h1>VENOM</h1>

    <!-- Lien Discord -->
    <p>
        Rejoin :
        <a href="https://discord.gg/BGUjzYhh84" target="_blank">
            https://discord.gg/BGUjzYhh84
        </a>
    </p>

    <!-- Description -->
    <div class="description">
        <p>WE ARE THINKERS WHO CREATE FOR THE COMMUNITY</p>
        <p>WE ARE CODERS</p>
        <p>WE ARE HACKERS</p>
    </div>

    <!-- Bouton YouTube -->
    <br>
    <button class="btn" onclick="window.open('https://www.youtube.com/channel/UC1Qjyg-xcQQfSc58KF0VaTA')">
        CHANNEL
    </button>

    <!-- Musique Venom (Eminem) -->
    <iframe width="0" height="0"
        src="https://www.youtube.com/embed/8CdcCD5V-d8?start=60&autoplay=1&loop=1&playlist=8CdcCD5V-d8"
        frameborder="0"
        allow="autoplay">
    </iframe>

</body>
</html>
