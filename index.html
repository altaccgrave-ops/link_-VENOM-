<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>VENOM</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap" rel="stylesheet">

    <style>
        /* Corps de la page */
        body {
            margin: 0;
            padding: 0;
            text-align: center;
            font-family: Arial, sans-serif;
            color: white;
            overflow: hidden;

            /* Fond noir/blanc style liquide Venom */
            background: #000;
            background: radial-gradient(circle at 50% 50%, #fff 0%, #000 100%);
            animation: liquid 20s infinite linear;
        }

        @keyframes liquid {
            0% { background-position: 0 0; }
            50% { background-position: 100% 100%; }
            100% { background-position: 0 0; }
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 80px;
            margin-top: 40px;
            color: white;
            text-shadow: 0 0 20px black;
        }

        a {
            font-size: 22px;
            text-decoration: none;
            font-weight: bold;
            text-shadow: 0 0 5px black;
        }

        a.discord-link { color: #fff; }
        a.discord-link:hover { color: #000; text-decoration: underline; }

        .description {
            margin-top: 40px;
            font-weight: bold;
            font-size: 24px;
            line-height: 1.6;
            text-shadow: 0 0 10px black;
            color: white;
        }

        .btn {
            margin-top: 60px;
            padding: 15px 40px;
            font-size: 20px;
            border: none;
            background: white;
            color: black;
            cursor: pointer;
            border-radius: 10px;
            transition: 0.3s;
            font-weight: bold;
        }

        .btn:hover {
            background: black;
            color: white;
        }

        /* Animation de “liquide” sur le texte (optionnel) */
        h1, .description, a, .btn {
            animation: pulse 3s infinite alternate;
        }

        @keyframes pulse {
            0% { opacity: 0.8; }
            100% { opacity: 1; }
        }
    </style>
</head>
<body>

    <!-- Titre -->
    <h1>VENOM</h1>

    <!-- Lien Discord -->
    <p>
        Rejoin : 
        <a href="https://discord.gg/BGUjzYhh84" target="_blank" class="discord-link">
            https://discord.gg/BGUjzYhh84
        </a>
    </p>

    <!-- Description -->
    <div class="description">
        <p>WE ARE THINKERS WHO CREATE FOR THE COMMUNITY</p>
        <p>WE ARE CODERS</p>
        <p>WE ARE HACKERS</p>
    </div>

    <!-- Bouton YouTube -->
    <button class="btn" onclick="window.open('https://www.youtube.com/channel/UC1Qjyg-xcQQfSc58KF0VaTA')">
        CHANNEL
    </button>

    <!-- Musique Venom (Eminem) -->
    <iframe width="0" height="0"
        src="https://www.youtube.com/embed/8CdcCD5V-d8?start=60&autoplay=1&loop=1&playlist=8CdcCD5V-d8"
        frameborder="0"
        allow="autoplay">
    </iframe>

</body>
</html>
